<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New Interest Received</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f5; color: #18181b; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #c026d3 0%, #e11d48 100%); padding: 40px 32px; text-align: center; }
    .header h1 { color: white; font-size: 26px; font-weight: 700; }
    .body { padding: 40px 32px; text-align: center; }
    .emoji { font-size: 64px; display: block; margin-bottom: 24px; }
    .message { font-size: 16px; color: #52525b; line-height: 1.7; margin-bottom: 32px; }
    .sender-name { font-weight: 700; color: #c026d3; font-size: 20px; }
    .btn { display: inline-block; background: linear-gradient(135deg, #c026d3, #e11d48); color: white; text-decoration: none; padding: 16px 40px; border-radius: 12px; font-weight: 700; font-size: 16px; }
    .footer { background: #fafafa; padding: 24px 32px; text-align: center; border-top: 1px solid #e4e4e7; font-size: 12px; color: #a1a1aa; line-height: 1.8; }
    .footer a { color: #c026d3; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>💌 New Interest Received!</h1>
    </div>
    <div class="body">
      <span class="emoji">💖</span>
      <p class="message">
        Hello <strong>{{receiverName}}</strong>,<br /><br />
        <span class="sender-name">{{senderName}}</span> has sent you an interest
        on Matrimony Platform! Login to view their profile and respond to their interest.
      </p>
      <a href="#" class="btn">View Profile →</a>
    </div>
    <div class="footer">
      <p>© {{year}} Matrimony Platform · <a href="#">Unsubscribe</a> · <a href="#">Privacy Policy</a></p>
    </div>
  </div>
</body>
</html>
